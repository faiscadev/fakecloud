name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo test --workspace --exclude fakecloud-e2e --exclude fakecloud-conformance

  build:
    name: Build ${{ matrix.name }}
    needs: check
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - name: darwin-amd64
            runner: macos-14
            target: x86_64-apple-darwin
          - name: darwin-arm64
            runner: macos-14
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }} --bin fakecloud

      - name: Package
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          DIR="fakecloud-${TAG}-${{ matrix.name }}"
          mkdir -p "${DIR}"
          cp "target/${{ matrix.target }}/release/fakecloud" "${DIR}/"
          cp LICENSE "${DIR}/"
          tar czf "${DIR}.tar.gz" "${DIR}"
          shasum -a 256 "${DIR}.tar.gz" > "${DIR}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: fakecloud-*.tar.gz*

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
          make_latest: true

  publish-crates:
    name: Publish Crates
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Verify tag matches Cargo.toml version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v${TAG} does not match Cargo.toml version ${VERSION}"
            exit 1
          fi
          echo "Tag v${TAG} matches Cargo.toml version ${VERSION}"

      - name: Publish all crates
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"

          wait_for_crate() {
            echo "Waiting for $1@$TAG on crates.io..."
            for i in $(seq 1 60); do
              if curl -sf "https://crates.io/api/v1/crates/$1/$TAG" > /dev/null 2>&1; then
                echo "$1@$TAG available after $((i * 5))s"
                return 0
              fi
              sleep 5
            done
            echo "WARNING: timed out waiting for $1@$TAG, continuing anyway"
          }

          publish() {
            echo "Publishing $1..."
            OUTPUT=$(cargo publish -p "$1" 2>&1) && {
              echo "Successfully published $1"
            } || {
              if echo "$OUTPUT" | grep -q "already uploaded"; then
                echo "Skipping $1: already published"
                return 0
              else
                echo "ERROR publishing $1:"
                echo "$OUTPUT"
                exit 1
              fi
            }
            wait_for_crate "$1"
          }

          # Layer 1: no internal deps
          publish fakecloud-aws
          publish fakecloud-sdk

          # Layer 2: depends on fakecloud-aws
          publish fakecloud-core

          # Layer 3: depend on aws + core only
          publish fakecloud-sqs
          publish fakecloud-sns
          publish fakecloud-iam
          publish fakecloud-lambda
          publish fakecloud-secretsmanager
          publish fakecloud-logs
          publish fakecloud-kms
          publish fakecloud-ses
          publish fakecloud-cognito

          # Layer 4: depend on layer 3 crates
          publish fakecloud-s3             # depends on kms
          publish fakecloud-ssm            # depends on secretsmanager
          publish fakecloud-eventbridge    # depends on lambda, logs

          # Layer 5: depends on layer 4
          publish fakecloud-dynamodb       # depends on s3

          # Layer 6: depends on all services
          publish fakecloud-cloudformation

          # Layer 7: the binary
          publish fakecloud
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-npm:
    name: Publish npm
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - name: Verify tag matches package.json version
        working-directory: sdks/typescript
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v${TAG} does not match package.json version ${VERSION}"
            exit 1
          fi
          echo "Tag v${TAG} matches package.json version ${VERSION}"

      - name: Build
        working-directory: sdks/typescript
        run: |
          npm ci
          npm run build

      - name: Publish
        working-directory: sdks/typescript
        run: npm publish --access public || { echo "Package may already be published"; npm view fakecloud@"$(node -p "require('./package.json').version")" version && echo "Already published, skipping" || exit 1; }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: Publish PyPI
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches pyproject.toml version
        working-directory: sdks/python
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v${TAG} does not match pyproject.toml version ${VERSION}"
            exit 1
          fi
          echo "Tag v${TAG} matches pyproject.toml version ${VERSION}"

      - name: Build
        working-directory: sdks/python
        run: |
          pip install build twine
          python -m build

      - name: Publish
        working-directory: sdks/python
        run: twine upload dist/* || { echo "Package may already be published"; pip install fakecloud=="${GITHUB_REF#refs/tags/v}" --dry-run 2>/dev/null && echo "Already published, skipping" || exit 1; }
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  publish-go:
    name: Publish Go module
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create and push Go module tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          GO_TAG="sdks/go/v${TAG}"
          # Check if tag already exists on remote
          if git ls-remote --tags origin "refs/tags/${GO_TAG}" | grep -q "${GO_TAG}"; then
            echo "Tag ${GO_TAG} already exists, skipping"
            exit 0
          fi
          git tag "${GO_TAG}" "${GITHUB_SHA}"
          git push origin "${GO_TAG}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
