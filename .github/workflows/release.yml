name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo test --workspace --exclude fakecloud-e2e --exclude fakecloud-conformance

  build:
    name: Build ${{ matrix.name }}
    needs: check
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - name: darwin-amd64
            runner: macos-14
            target: x86_64-apple-darwin
          - name: darwin-arm64
            runner: macos-14
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }} --bin fakecloud

      - name: Package
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          DIR="fakecloud-${TAG}-${{ matrix.name }}"
          mkdir -p "${DIR}"
          cp "target/${{ matrix.target }}/release/fakecloud" "${DIR}/"
          cp LICENSE "${DIR}/"
          tar czf "${DIR}.tar.gz" "${DIR}"
          shasum -a 256 "${DIR}.tar.gz" > "${DIR}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: fakecloud-*.tar.gz*

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
          make_latest: true

  publish-crates:
    name: Publish Crates
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Verify tag matches Cargo.toml version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v${TAG} does not match Cargo.toml version ${VERSION}"
            exit 1
          fi
          echo "Tag v${TAG} matches Cargo.toml version ${VERSION}"

      - name: Verify CI checks passed on tagged commit
        run: |
          COMMIT_SHA="${GITHUB_SHA}"
          STATUS=$(gh api "repos/${{ github.repository }}/commits/${COMMIT_SHA}/status" --jq '.state')
          if [ "$STATUS" = "failure" ]; then
            echo "::error::CI checks failed on commit ${COMMIT_SHA}"
            exit 1
          fi
          echo "CI status on ${COMMIT_SHA}: ${STATUS}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish all crates
        run: |
          publish() {
            echo "Publishing $1..."
            OUTPUT=$(cargo publish -p "$1" 2>&1) && {
              echo "Successfully published $1"
            } || {
              if echo "$OUTPUT" | grep -q "already uploaded"; then
                echo "Skipping $1: already published"
              else
                echo "ERROR publishing $1:"
                echo "$OUTPUT"
                exit 1
              fi
            }
            echo "Waiting for crates.io index..."
            sleep 60
          }

          # Layer 1: no internal deps
          publish fakecloud-aws

          # Layer 2: depends on fakecloud-aws
          publish fakecloud-core

          # Layer 3: depend on aws + core
          publish fakecloud-sqs
          publish fakecloud-sns
          publish fakecloud-eventbridge
          publish fakecloud-iam
          publish fakecloud-ssm
          publish fakecloud-dynamodb
          publish fakecloud-lambda
          publish fakecloud-secretsmanager
          publish fakecloud-logs
          publish fakecloud-kms
          publish fakecloud-s3

          # Layer 4: depends on layer 3 services
          publish fakecloud-cloudformation

          # Layer 5: depends on all
          publish fakecloud
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
