name: Examples

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build server
        run: cargo build --bin fakecloud

      - name: Start FakeCloud
        run: |
          cargo run --bin fakecloud &
          for i in $(seq 1 30); do
            curl -sf http://localhost:4566/_fakecloud/health && exit 0
            sleep 1
          done
          echo "FakeCloud failed to start"
          exit 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Python demo
        run: |
          pip install boto3
          python examples/python/demo.py

      - name: Run Node demo
        run: |
          npm install @aws-sdk/client-sqs @aws-sdk/client-sns @aws-sdk/client-ssm @aws-sdk/client-s3 @aws-sdk/client-dynamodb @aws-sdk/client-lambda @aws-sdk/client-secrets-manager @aws-sdk/client-cloudwatch-logs @aws-sdk/client-kms
          node examples/node/demo.js

      - name: Run sample app
        run: python examples/sample-app/app.py

      - uses: hashicorp/setup-terraform@v3

      - name: Run Terraform example
        working-directory: examples/terraform
        run: |
          rm -rf .terraform .terraform.lock.hcl terraform.tfstate*
          terraform init
          terraform apply -auto-approve
          terraform destroy -auto-approve
