name: SDK Go

on:
  push:
    branches: [main]
    paths:
      - "sdks/go/**"
  pull_request:
    branches: [main]
    paths:
      - "sdks/go/**"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: sdks/go/go.sum
      - run: go build ./...
      - run: go test ./...

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build fakecloud
        run: cargo build --release
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: sdks/go/e2e/go.sum
      - name: Run e2e tests
        run: go test -v -timeout 120s ./...
        working-directory: sdks/go/e2e

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: sdks/go/go.sum
      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: sdks/go
      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: sdks/go/e2e
