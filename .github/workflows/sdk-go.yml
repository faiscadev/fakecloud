name: SDK Go

on:
  push:
    branches: [main]
    paths:
      - "sdks/go/**"
  pull_request:
    branches: [main]
    paths:
      - "sdks/go/**"

defaults:
  run:
    working-directory: sdks/go

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: sdks/go/go.sum
      - run: go build ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build fakecloud
        run: cargo build --release
        working-directory: .
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: sdks/go/go.sum
      - run: go test -v -timeout 120s ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: sdks/go/go.sum
      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: sdks/go
