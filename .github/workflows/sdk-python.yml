name: SDK Python

on:
  push:
    branches: [main]
    paths:
      - "sdks/python/**"
  pull_request:
    branches: [main]
    paths:
      - "sdks/python/**"

defaults:
  run:
    working-directory: sdks/python

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install '.[dev]'
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install '.[dev]'
      - run: mypy src

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build fakecloud
        run: cargo build --release
        working-directory: .
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install '.[dev]'
      - run: pytest -v
