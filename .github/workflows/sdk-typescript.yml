name: SDK TypeScript

on:
  push:
    paths:
      - "sdks/typescript/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    paths:
      - "sdks/typescript/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"

defaults:
  run:
    working-directory: sdks/typescript

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build fakecloud
        run: cargo build --release
        working-directory: .

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: sdks/typescript/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test
