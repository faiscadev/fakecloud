<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}{{ config.title }}{% endblock %}</title>
<meta name="description" content="{% block description %}{{ config.description }}{% endblock %}">
<link rel="help" href="/llms.txt" type="text/markdown" title="LLM documentation">
{% if config.generate_feeds %}
<link rel="alternate" type="application/rss+xml" title="fakecloud blog" href="{{ get_url(path='rss.xml') }}">
{% endif %}
<link rel="stylesheet" href="/style.css">
<script>
  (function() {
    var t = localStorage.getItem('theme');
    if (t) document.documentElement.setAttribute('data-theme', t);
  })();
</script>
</head>
<body>

<nav>
  <div class="container">
    <a href="/" class="logo">fake<span>cloud</span></a>
    <div class="links">
      <a href="/#features">Features</a>
      <a href="/#quickstart">Quick Start</a>
      <a href="/#compare">Compare</a>
      <a href="/blog/">Blog</a>
      <a href="{{ config.extra.github }}">GitHub</a>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme"></button>
    </div>
  </div>
</nav>

{% block content %}{% endblock %}

<footer>
  <div class="container">
    <p>Built by <a href="https://faisca.dev">faisca</a></p>
    <div class="links">
      <a href="{{ config.extra.github }}">Source</a>
      <a href="{{ config.extra.github }}/issues">Issues</a>
      <a href="{{ config.extra.github }}/blob/main/LICENSE">License</a>
    </div>
  </div>
</footer>

<script>
  (function() {
    var btn = document.getElementById('theme-toggle');
    function getEffective() {
      var t = document.documentElement.getAttribute('data-theme');
      if (t) return t;
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    function update() {
      btn.textContent = getEffective() === 'dark' ? '\u2600\uFE0F' : '\uD83C\uDF19';
    }
    btn.addEventListener('click', function() {
      var next = getEffective() === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      update();
    });
    update();
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', update);
  })();

  // Copy buttons
  document.querySelectorAll('.blog-article pre, .code-block').forEach(function(block) {
    var btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = 'Copy';
    btn.addEventListener('click', function() {
      var text = block.querySelector('code') ? block.querySelector('code').textContent : block.textContent;
      text = text.replace(/^\$ /gm, '').replace(/^# .*\n?/gm, '').trim();
      navigator.clipboard.writeText(text).then(function() {
        btn.textContent = 'Copied!';
        setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
      });
    });
    block.appendChild(btn);
  });
</script>
</body>
</html>
